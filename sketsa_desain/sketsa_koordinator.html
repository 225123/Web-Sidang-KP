<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sketsa - Koordinator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { height: 100%; margin: 0; background-color: #f0f0f0; }
        .sketch-box { border: 2px dashed #666; background-color: #fff; }
        .sketch-text { background-color: #ccc; color: transparent; border-radius: 4px; display: inline-block; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-gray-800 font-sans">
    
    <!-- Header -->
    <header class="bg-gray-200 border-b-2 border-gray-400 flex items-center justify-between px-6 py-3 shrink-0 h-[76px]">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 sketch-box flex items-center justify-center rounded">
                <div class="w-4 h-0.5 bg-gray-600 mb-1"></div>
                <div class="w-4 h-0.5 bg-gray-600 mb-1"></div>
                <div class="w-4 h-0.5 bg-gray-600"></div>
            </div>
            <div class="sketch-text w-32 h-6">TITLE</div>
        </div>
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 rounded-full sketch-box"></div>
            <div class="flex flex-col text-right">
                <div class="sketch-text w-16 h-3 mb-1"></div>
                <div class="sketch-text w-24 h-4"></div>
            </div>
            <div class="w-12 h-12 rounded-full sketch-box"></div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-[220px] bg-gray-200 border-r-2 border-gray-400 shrink-0 p-4 flex flex-col gap-2 overflow-y-auto">
            <div class="h-10 sketch-box w-full rounded flex items-center px-3 gap-2">
                <div class="w-5 h-5 rounded sketch-box"></div>
                <div class="sketch-text w-20 h-4"></div>
            </div>
            <div class="h-10 sketch-box w-full rounded flex items-center px-3 gap-2">
                <div class="w-5 h-5 rounded sketch-box"></div>
                <div class="sketch-text w-24 h-4"></div>
            </div>
            <div class="h-10 sketch-box w-full rounded flex items-center px-3 gap-2">
                <div class="w-5 h-5 rounded sketch-box"></div>
                <div class="sketch-text w-20 h-4"></div>
            </div>
            <div class="h-10 sketch-box w-full rounded flex items-center px-3 gap-2">
                <div class="w-5 h-5 rounded sketch-box"></div>
                <div class="sketch-text w-28 h-4"></div>
            </div>
            <div class="h-10 sketch-box w-full rounded flex items-center px-3 gap-2">
                <div class="w-5 h-5 rounded sketch-box"></div>
                <div class="sketch-text w-16 h-4"></div>
            </div>
            <div class="h-10 sketch-box w-full rounded flex items-center px-3 gap-2">
                <div class="w-5 h-5 rounded sketch-box"></div>
                <div class="sketch-text w-24 h-4"></div>
            </div>
            <div class="h-10 sketch-box w-full rounded flex items-center px-3 gap-2 mt-4">
                <div class="w-5 h-5 rounded sketch-box"></div>
                <div class="sketch-text w-12 h-4"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 bg-gray-100 p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <div class="sketch-text w-48 h-8"></div>
                <div class="sketch-box w-40 h-8 rounded"></div>
            </div>

            <!-- Stats Boxes -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="sketch-box rounded-lg p-5 h-28 flex flex-col justify-between">
                    <div class="flex justify-between">
                        <div class="sketch-text w-24 h-5"></div>
                        <div class="w-8 h-8 rounded sketch-box"></div>
                    </div>
                    <div class="sketch-text w-16 h-8"></div>
                </div>
                <div class="sketch-box rounded-lg p-5 h-28 flex flex-col justify-between">
                    <div class="flex justify-between">
                        <div class="sketch-text w-24 h-5"></div>
                        <div class="w-8 h-8 rounded sketch-box"></div>
                    </div>
                    <div class="sketch-text w-16 h-8"></div>
                </div>
                <div class="sketch-box rounded-lg p-5 h-28 flex flex-col justify-between">
                    <div class="flex justify-between">
                        <div class="sketch-text w-24 h-5"></div>
                        <div class="w-8 h-8 rounded sketch-box"></div>
                    </div>
                    <div class="sketch-text w-16 h-8"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Chart Area -->
                <div class="sketch-box rounded-lg p-6 h-64 flex flex-col">
                    <div class="sketch-text w-32 h-6 mb-4"></div>
                    <div class="flex-1 sketch-box rounded flex items-end justify-around pb-2 px-2">
                        <div class="w-8 h-2/3 bg-gray-300 rounded-t"></div>
                        <div class="w-8 h-1/2 bg-gray-300 rounded-t"></div>
                        <div class="w-8 h-4/5 bg-gray-300 rounded-t"></div>
                        <div class="w-8 h-1/3 bg-gray-300 rounded-t"></div>
                        <div class="w-8 h-full bg-gray-300 rounded-t"></div>
                    </div>
                </div>
                
                <!-- Recent Activities -->
                <div class="sketch-box rounded-lg p-6 h-64 overflow-hidden flex flex-col">
                    <div class="sketch-text w-32 h-6 mb-4"></div>
                    <div class="flex flex-col gap-4">
                        <div class="flex gap-3 items-center">
                            <div class="w-8 h-8 rounded-full sketch-box shrink-0"></div>
                            <div class="flex flex-col w-full">
                                <div class="sketch-text w-full h-3 mb-1"></div>
                                <div class="sketch-text w-1/2 h-2"></div>
                            </div>
                        </div>
                        <div class="flex gap-3 items-center">
                            <div class="w-8 h-8 rounded-full sketch-box shrink-0"></div>
                            <div class="flex flex-col w-full">
                                <div class="sketch-text w-3/4 h-3 mb-1"></div>
                                <div class="sketch-text w-1/3 h-2"></div>
                            </div>
                        </div>
                        <div class="flex gap-3 items-center">
                            <div class="w-8 h-8 rounded-full sketch-box shrink-0"></div>
                            <div class="flex flex-col w-full">
                                <div class="sketch-text w-5/6 h-3 mb-1"></div>
                                <div class="sketch-text w-1/4 h-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 h-[40px] shrink-0 flex items-center justify-center border-t-2 border-gray-600">
        <div class="sketch-text w-64 h-3 bg-gray-500"></div>
    </footer>
</body>
</html>
